[pytest]
log_format = %(asctime)s %(levelname)s %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
markers =
    smoke: marks tests as smoke (deselect with '-m "not smoke"')
    integration: for integration test
    EC2: for EC2 e2e test
    crossAccEC2: for cross account EC2 e2e test
    eksDaemonset: for eks daemonset
    eksSidecar: for eks sidecar
    crossEksDaemonset: for eks cross account daemonset log
    crossEksSidecar: for eks cross account sidecar log
    develop: for develop test
    syslog: for syslog test
    servie: for service log ingestion test